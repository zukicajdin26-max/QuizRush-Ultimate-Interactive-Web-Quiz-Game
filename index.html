<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QuizRush Ultimate</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(to right, #0f172a, #1e293b);
  color: white;
  text-align: center;
}

.container {
  max-width: 600px;
  margin: auto;
  margin-top: 30px;
  background: #111827;
  padding: 20px;
  border-radius: 12px;
  animation: fadeIn 0.5s ease;
}

button {
  width: 100%;
  margin: 10px 0;
  padding: 15px;
  border-radius: 8px;
  border: none;
  background: #2563eb;
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.03);
  background: #1d4ed8;
}

.correct {
  background: green !important;
}

.wrong {
  background: red !important;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(20px);}
  to {opacity:1;}
}

.hidden {
  display: none;
}

@media(max-width:600px){
  .container {
    margin: 10px;
    padding: 15px;
  }
}
</style>
</head>

<body>

<div class="container">

<div id="menu">
  <h1>🔥 QuizRush Ultimate</h1>
  <p>Select Category</p>
  <button onclick="startGame('general')">General</button>
  <button onclick="startGame('math')">Math</button>
</div>

<div id="game" class="hidden">
  <p id="score">Score: 0</p>
  <p id="timer"></p>
  <h2 id="question"></h2>
  <div id="answers"></div>
</div>

</div>

<audio id="correctSound" src="https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3"></audio>
<audio id="wrongSound" src="https://assets.mixkit.co/sfx/preview/mixkit-player-losing-or-failing-2042.mp3"></audio>

<script>
let score = 0;
let timeLeft = 10;
let timer;
let questions = [];
let usedQuestions = [];

// pitanja (više + neće se ponavljati)
const questionBank = {
  general: [
    {q:"Capital of France?", a:["Paris","Rome","Berlin","Madrid"], c:0},
    {q:"Largest ocean?", a:["Atlantic","Indian","Pacific","Arctic"], c:2},
    {q:"Biggest planet?", a:["Earth","Mars","Jupiter","Venus"], c:2},
    {q:"Fastest land animal?", a:["Lion","Tiger","Cheetah","Horse"], c:2},
    {q:"Which is a programming language?", a:["HTML","CSS","JavaScript","All"], c:3},
    {q:"Color of sky?", a:["Blue","Red","Green","Yellow"], c:0}
  ],
  math: [
    {q:"2 + 2?", a:["3","4","5","6"], c:1},
    {q:"5 x 3?", a:["10","15","20","25"], c:1},
    {q:"10 - 4?", a:["5","6","7","8"], c:1},
    {q:"12 / 3?", a:["3","4","5","6"], c:1},
    {q:"7 + 8?", a:["13","14","15","16"], c:2},
    {q:"9 x 2?", a:["16","18","20","22"], c:1}
  ]
};

function startGame(category){
  questions = [...questionBank[category]];
  usedQuestions = [];
  score = 0;

  document.getElementById("menu").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");

  loadQuestion();
}

function loadQuestion(){
  clearInterval(timer);

  if(questions.length === 0){
    alert("🎉 You completed all questions! Score: " + score);
    location.reload();
    return;
  }

  timeLeft = 10;
  document.getElementById("timer").innerText = "Time: " + timeLeft;

  let index = Math.floor(Math.random() * questions.length);
  let q = questions.splice(index,1)[0];

  document.getElementById("question").innerText = q.q;

  let answersDiv = document.getElementById("answers");
  answersDiv.innerHTML = "";

  q.a.forEach((ans,i)=>{
    let btn = document.createElement("button");
    btn.innerText = ans;

    btn.onclick = ()=>{
      if(i === q.c){
        document.getElementById("correctSound").play();
        btn.classList.add("correct");
        score += 10;
        setTimeout(loadQuestion, 500);
      } else {
        document.getElementById("wrongSound").play();
        btn.classList.add("wrong");
        setTimeout(()=>{
          alert("💀 Game Over! Score: " + score);
          location.reload();
        },500);
      }
      updateScore();
    };

    answersDiv.appendChild(btn);
  });

  timer = setInterval(()=>{
    timeLeft--;
    document.getElementById("timer").innerText = "Time: " + timeLeft;

    if(timeLeft <= 0){
      alert("⏰ Time up! Score: " + score);
      location.reload();
    }
  },1000);

  updateScore();
}

function updateScore(){
  document.getElementById("score").innerText = "Score: " + score;
}
</script>

</body>
</html>
